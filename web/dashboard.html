<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Nexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/nexus.css">
  <style>
    .login-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 48px 40px;
      background: rgba(8, 13, 26, 0.9);
      border: 1px solid var(--border);
      text-align: center;
    }
    .login-card h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.6rem;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .login-note {
      margin-top: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <nav>
    <a href="/" class="logo">NEX<span>US</span></a>
  </nav>

  <main class="login-wrap">
    <div class="login-card">
      <div class="section-label">// PANEL DE CONTROL</div>
      <h1>DASHBOARD</h1>
      <p>Inicia sesión con Discord para configurar registro, killboard, batallas y más en tu servidor.</p>
      <button class="btn btn-discord btn-lg" id="btn-login" type="button" disabled>Iniciar sesión con Discord</button>
      <p class="login-note">OAuth en desarrollo — próximamente</p>
      <a class="back-link" href="/">← Volver al inicio</a>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script>
    const base = (window.NEXUS_API || '').replace(/\/$/, '');
    fetch(`${base}/api/public`)
      .then((r) => r.json())
      .then((d) => {
        const btn = document.getElementById('btn-login');
        if (d.oauthUrl) {
          btn.disabled = false;
          btn.onclick = () => { window.location.href = d.oauthUrl; };
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
