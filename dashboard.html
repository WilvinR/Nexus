<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Nexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <nav>
    <a href="/" class="logo">NEX<span>US</span></a>
  </nav>

  <main class="dash-wrap" id="app">
    <section id="view-login" class="dash-panel">
      <div class="section-label">// PANEL DE CONTROL</div>
      <h1 class="dash-title">DASHBOARD</h1>
      <p class="dash-sub">Inicia sesión con Discord. Solo verás servidores donde eres dueño o tienes permiso de administrar y Nexus está instalado.</p>
      <button type="button" class="btn btn-discord btn-lg" id="btn-login">Iniciar sesión con Discord</button>
    </section>

    <section id="view-dash" class="dash-panel hidden">
      <div class="dash-head">
        <div>
          <div class="section-label">// CONFIGURACIÓN</div>
          <h1 class="dash-title">TUS SERVIDORES</h1>
          <p class="dash-user" id="user-label"></p>
        </div>
        <button type="button" class="btn btn-accent" id="btn-logout">Cerrar sesión</button>
      </div>
      <p class="dash-hint" id="dash-hint">Activa o desactiva módulos por servidor.</p>

      <div id="guild-grid" class="guild-grid"></div>

      <section id="guild-config" class="guild-config hidden">
        <button type="button" class="btn-back" id="btn-back" aria-label="Volver a servidores">← Servidores</button>
        <header class="guild-config-head">
          <div id="guild-config-avatar" class="guild-avatar"></div>
          <div>
            <h2 class="guild-config-title" id="guild-config-name"></h2>
            <p class="guild-config-sub">Módulos de este servidor</p>
          </div>
        </header>
        <div id="mod-list" class="mod-list mod-cards"></div>
      </section>
    </section>
  </main>

  <div id="modal-backdrop" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <button type="button" class="modal-close" id="modal-close" aria-label="Cerrar">×</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="js/dashboard-modules.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
